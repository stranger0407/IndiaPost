# ================================================================
#  Post Office Service — Application Configuration
# ================================================================
spring.application.name=postoffice-service
server.port=8081

# External Postal PIN Code API
postoffice.api.base-url=https://api.postalpincode.in

# Cache configuration (simple in-memory cache)
spring.cache.type=simple

# Actuator
management.endpoints.web.exposure.include=health,info,caches
management.endpoint.health.show-details=always

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.indiapost.postoffice=DEBUG
