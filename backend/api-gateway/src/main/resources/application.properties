# ================================================================
#  API Gateway — Application Configuration
# ================================================================
spring.application.name=api-gateway
server.port=8080

# Downstream service URLs
gateway.services.postoffice-url=http://localhost:8081
gateway.services.tracking-url=http://localhost:8082

# Actuator — expose health & info endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.indiapost.gateway=DEBUG
logging.level.org.springframework.web.reactive=DEBUG
